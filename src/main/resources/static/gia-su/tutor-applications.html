<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Quản lý ứng tuyển</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="page-bg">
  <header class="site-header">
    <div class="container header-inner">
      <div class="header-left">
        <a href="/index.html" class="logo">
          <div class="logo-box"><i class="fas fa-graduation-cap"></i></div>
          <span>Cổng Gia Sư</span>
        </a>
        <nav class="desktop-nav">
          <a href="/index.html">Trang chủ</a>
          <a href="/tim-gia-su.html">Tìm gia sư</a>
          <a href="/lop-gia-su.html">Tìm lớp học</a>
        </nav>
      </div>
      <div class="header-right" id="headerRight"></div>
      <button id="mobileMenuButton" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
    </div>
    <div id="mobileMenu" class="mobile-menu hidden">
      <a href="/index.html">Trang chủ</a>
      <a href="/tim-gia-su.html">Tìm gia sư</a>
      <a href="/lop-gia-su.html">Tìm lớp học</a>
    </div>
  </header>

  <main class="container page-section">
    <div class="heading">
      <h1>Đơn ứng tuyển của tôi</h1>
      <p>Theo dõi các đơn ứng tuyển đã gửi đến bài đăng của học viên / phụ huynh</p>
    </div>

    <div class="manage-tabs" id="applicationTabs">
      <button class="manage-tab active" data-status="all">Tất cả</button>
      <button class="manage-tab" data-status="PENDING">Đang chờ</button>
      <button class="manage-tab" data-status="ACCEPTED">Được chấp nhận</button>
      <button class="manage-tab" data-status="REJECTED">Bị từ chối</button>
      <button class="manage-tab" data-status="CANCELLED">Đã hủy</button>
    </div>

    <div class="list-grid" id="applicationsList"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <div>
        <div class="logo footer-logo">
          <div class="logo-box"><i class="fas fa-graduation-cap"></i></div>
          <span>Cổng Gia Sư</span>
        </div>
      </div>
    </div>
    <div class="footer-bottom">© 2025 Cổng Gia Sư.</div>
  </footer>

  <script src="../assets/js/app.js"></script><script src="../assets/js/api-client.js"></script>
  <script src="../assets/js/tutor-applications-page.js"></script>
