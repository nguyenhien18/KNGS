<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Quản lý người dùng</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>
  <body class="page-bg admin-users-page">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a href="/index.html" class="logo">
            <div class="logo-box">
              <i class="fas fa-graduation-cap">
              </i>
            </div>
            <span>Gia Sư Việt</span>
          </a>
          <nav class="desktop-nav">
            <a href="/index.html">Trang chủ</a>
            <a href="/tim-gia-su.html">Tìm gia sư</a>
            <a href="/lop-gia-su.html">Tìm lớp học</a>
          </nav>
        </div>
        <div class="header-right" id="headerRight">
        </div>
        <button id="mobileMenuButton" class="mobile-menu-btn">
          <i class="fas fa-bars">
          </i>
        </button>
      </div>
      <div id="mobileMenu" class="mobile-menu hidden">
      </div>
    </header>
    <main class="container page-section admin-users-shell">
      <div class="heading">
        <h1>Quản lý người dùng</h1>
        <p>Lọc nhanh và cập nhật trạng thái tài khoản</p>
      </div>
      <section class="card-box admin-filter-card">
        <div class="admin-filter-grid">
          <div class="field">
            <label>Vai trò</label>
            <select id="roleFilter">
              <option value="">Tất cả</option>
              <option value="ADMIN">ADMIN</option>
              <option value="TUTOR">TUTOR</option>
              <option value="LEARNER">LEARNER</option>
            </select>
          </div>
          <div class="field">
            <label>Trạng thái</label>
            <select id="statusFilter">
              <option value="">Tất cả</option>
              <option value="ACTIVE">Đang hoạt động</option>
              <option value="BLOCKED">Đã khóa</option>
            </select>
          </div>
          <button id="filterBtn" class="btn btn-primary">
            <i class="fas fa-filter">
            </i> Lọc</button>
        </div>
      </section>
      <div class="users-toolbar">
        <span id="usersCountText">Đang tải dữ liệu...</span>
        <span>
          <strong>Quản lý quyền truy cập</strong> theo vai trò</span>
      </div>
      <div id="usersList" class="users-grid">
      </div>
    </main>
    <footer class="site-footer">
    </footer>
    <script src="../assets/js/core/format-utils.js">
    </script>
    <script src="../assets/js/core/dom-utils.js">
    </script>
    <script src="../assets/js/core/ui-utils.js">
    </script>
    <script src="../assets/js/core/app.js">
    </script>
    <script src="../assets/js/core/api-client.js">
    </script>
    <script src="../assets/js/core/auth-guard.js">
    </script>
    <script src="../assets/js/admin/users.js">
    </script>
  </body>
</html>
