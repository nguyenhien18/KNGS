<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Duyệt hệ thống</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>
  <body class="page-bg admin-reviews-page">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a href="/index.html" class="logo">
            <div class="logo-box">
              <i class="fas fa-graduation-cap">
              </i>
            </div>
            <span>Gia Sư Việt</span>
          </a>
          <nav class="desktop-nav">
            <a href="/index.html">Trang chủ</a>
            <a href="/tim-gia-su.html">Tìm gia sư</a>
            <a href="/lop-gia-su.html">Tìm lớp học</a>
          </nav>
        </div>
        <div class="header-right" id="headerRight">
        </div>
        <button id="mobileMenuButton" class="mobile-menu-btn">
          <i class="fas fa-bars">
          </i>
        </button>
      </div>
      <div id="mobileMenu" class="mobile-menu hidden">
      </div>
    </header>
    <main class="container page-section">
      <div class="heading">
        <h1>Duyệt hệ thống</h1>
        <p>Duyệt hồ sơ gia sư, bài đăng học viên và khóa học gia sư mở</p>
      </div>
      <div class="manage-tabs review-tabs" id="reviewTabs">
        <button class="manage-tab active" data-kind="tutor">
          Hồ sơ gia sư
          <span id="countTutor" class="badge badge-warning tab-count">0</span>
        </button>
        <button class="manage-tab" data-kind="post">
          Bài đăng học viên
          <span id="countPost" class="badge badge-warning tab-count">0</span>
        </button>
        <button class="manage-tab" data-kind="course">
          Lớp/khóa học gia sư
          <span id="countCourse" class="badge badge-warning tab-count">0</span>
        </button>
        <button class="manage-tab" data-kind="identity">
          Xác minh danh tính
          <span id="countIdentity" class="badge badge-warning tab-count">0</span>
        </button>
      </div>
      <div class="card-box">
        <div class="section-heading-split review-section-header">
          <h2 id="reviewSectionTitle" class="detail-section-title review-section-title">Hồ sơ gia sư chờ duyệt</h2>
          <span id="reviewTotal" class="badge badge-primary">0 mục</span>
        </div>
        <div id="reviewList" class="list-grid">
        </div>
      </div>
    </main>
    <div id="tutorDetailModal" class="modal-backdrop hidden" data-close="true">
      <div class="modal-box modal-lg review-detail-modal">
        <div class="modal-header">
          <h3 id="reviewDetailModalTitle">Chi tiết hồ sơ gia sư</h3>
          <button class="modal-close" data-close="true">&times;</button>
        </div>
        <div class="modal-body" id="tutorDetailBody">
        </div>
      </div>
    </div>
    <div id="rejectReasonModal" class="modal-backdrop hidden">
      <div class="modal-box modal-md reject-reason-modal" role="dialog" aria-modal="true" aria-labelledby="rejectReasonTitle">
        <div class="modal-header">
          <h3 id="rejectReasonTitle">Lý do từ chối</h3>
          <button class="modal-close" type="button" data-reject-close="true">&times;</button>
        </div>
        <form id="rejectReasonForm" class="modal-body reject-reason-form">
          <div class="form-group">
            <label for="rejectReasonInput">Lý do</label>
            <textarea id="rejectReasonInput" rows="4" maxlength="255" placeholder="Nhập lý do từ chối"></textarea>
          </div>
          <div class="reject-reason-actions">
            <button type="button" class="btn btn-soft" data-reject-close="true">Hủy</button>
            <button type="submit" class="btn btn-primary">Gửi</button>
          </div>
        </form>
      </div>
    </div>
    <footer class="site-footer">
    </footer>
    <script src="../assets/js/core/format-utils.js">
    </script>
    <script src="../assets/js/core/dom-utils.js">
    </script>
    <script src="../assets/js/core/ui-utils.js">
    </script>
    <script src="../assets/js/core/app.js">
    </script>
    <script src="../assets/js/core/api-client.js">
    </script>
    <script src="../assets/js/core/auth-guard.js">
    </script>
    <script src="../assets/js/admin/review-api.js">
    </script>
    <script src="../assets/js/admin/review-list.js">
    </script>
    <script src="../assets/js/admin/image-lightbox.js">
    </script>
    <script src="../assets/js/admin/review-detail.js">
    </script>
    <script src="../assets/js/admin/reviews.js?v=20260613-reject-modal-2">
    </script>
  </body>
</html>
