<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Duyet he thong</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body class="page-bg">
<header class="site-header">
  <div class="container header-inner">
    <div class="header-left">
      <a href="/index.html" class="logo"><div class="logo-box"><i class="fas fa-graduation-cap"></i></div><span>Gia Su Viet</span></a>
      <nav class="desktop-nav"><a href="/index.html">Trang chu</a><a href="/tim-gia-su.html">Tim gia su</a><a href="/lop-gia-su.html">Tim lop hoc</a></nav>
    </div>
    <div class="header-right" id="headerRight"></div>
    <button id="mobileMenuButton" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
  </div>
  <div id="mobileMenu" class="mobile-menu hidden"></div>
</header>
<main class="container page-section">
  <div class="heading">
    <h1>Duyet he thong</h1>
    <p>Duyet ho so gia su, bai dang hoc vien va khoa hoc gia su mo</p>
  </div>

  <div class="manage-tabs" id="reviewTabs" style="max-width:860px">
    <button class="manage-tab active" data-kind="tutor">
      Ho so gia su
      <span id="countTutor" class="badge badge-warning" style="margin-left:8px">0</span>
    </button>
    <button class="manage-tab" data-kind="post">
      Bai dang hoc vien
      <span id="countPost" class="badge badge-warning" style="margin-left:8px">0</span>
    </button>
    <button class="manage-tab" data-kind="course">
      Lop/khoa hoc gia su
      <span id="countCourse" class="badge badge-warning" style="margin-left:8px">0</span>
    </button>
    <button class="manage-tab" data-kind="identity">
      Xac minh danh tinh
      <span id="countIdentity" class="badge badge-warning" style="margin-left:8px">0</span>
    </button>
  </div>

  <div class="card-box">
    <div class="section-heading-split" style="margin-bottom:12px">
      <h2 id="reviewSectionTitle" class="detail-section-title" style="margin:0">Ho so gia su cho duyet</h2>
      <span id="reviewTotal" class="badge badge-primary">0 muc</span>
    </div>
    <div id="reviewList" class="list-grid"></div>
  </div>
</main>

<div id="tutorDetailModal" class="modal-backdrop hidden" data-close="true">
  <div class="modal-box modal-lg" style="max-width:760px">
    <div class="modal-header">
      <h3 id="reviewDetailModalTitle">Chi tiet ho so gia su</h3>
      <button class="modal-close" data-close="true">&times;</button>
    </div>
    <div class="modal-body" id="tutorDetailBody"></div>
  </div>
</div>

<footer class="site-footer"></footer>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/api-client.js"></script>
<script src="../assets/js/admin-reviews.js?v=20260422-3"></script>
</body>
</html>
