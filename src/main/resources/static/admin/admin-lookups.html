<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Quản lý môn học và khối lớp</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .page-section { max-width: 1240px; }
    .heading h1 { font-size: 50px; line-height: 1.1; margin-bottom: 8px; }
    .heading p { font-size: 16px; color: var(--secondary-600); }
    .lookup-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 18px;
      align-items: start;
    }
    .lookup-panel {
      display: grid;
      gap: 12px;
      padding: 16px;
    }
    .lookup-list {
      display: grid;
      gap: 10px;
    }
    .lookup-item {
      border: 1px solid var(--secondary-200);
      border-radius: 12px;
      background: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }
    .lookup-name {
      margin: 0;
      font-size: 20px;
      font-weight: 600;
      color: var(--secondary-900);
      line-height: 1.25;
      text-transform: none;
    }
    .lookup-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .lookup-actions .btn {
      min-width: 88px;
      height: 36px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      padding: 0 12px;
    }
    .lookup-panel .section-heading-split .btn {
      height: 40px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
    }
    .modal-box.modal-md {
      max-width: 480px;
    }
    .modal-body .form-group label {
      font-size: 15px;
      font-weight: 600;
      color: var(--secondary-700);
    }
    .modal-body .form-group input {
      height: 42px;
      font-size: 16px;
      border-radius: 10px;
    }
    .modal-body .form-actions {
      margin-top: 14px !important;
    }
    .modal-body .form-actions .btn {
      height: 38px;
      min-width: 88px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
    }
    @media (max-width: 1200px) {
      .heading h1 { font-size: 44px; }
    }
    @media (max-width: 1024px) {
      .lookup-grid { grid-template-columns: 1fr; }
      .heading h1 { font-size: 38px; }
      .lookup-name { font-size: 18px; }
    }
    @media (max-width: 640px) {
      .heading h1 { font-size: 32px; }
      .heading p { font-size: 15px; }
      .lookup-item { flex-direction: column; align-items: flex-start; }
      .lookup-name { font-size: 17px; }
      .lookup-actions { width: 100%; }
      .lookup-actions .btn { flex: 1; min-width: 0; }
    }
  </style>
</head>
<body class="page-bg">
<header class="site-header">
  <div class="container header-inner">
    <div class="header-left">
      <a href="/index.html" class="logo"><div class="logo-box"><i class="fas fa-graduation-cap"></i></div><span>Gia Sư Việt</span></a>
      <nav class="desktop-nav"><a href="/index.html">Trang chủ</a><a href="/tim-gia-su.html">Tìm gia sư</a><a href="/lop-gia-su.html">Tìm lớp học</a></nav>
    </div>
    <div class="header-right" id="headerRight"></div>
    <button id="mobileMenuButton" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
  </div>
  <div id="mobileMenu" class="mobile-menu hidden"></div>
</header>

<main class="container page-section">
  <div class="heading">
    <h1>Danh mục môn học và khối lớp</h1>
    <p>Thêm, sửa, xóa danh mục dùng cho tìm kiếm và tạo bài đăng/lớp học</p>
  </div>

  <div class="lookup-grid">
    <section class="card-box lookup-panel">
      <div class="section-heading-split">
        <h2 class="detail-section-title">Môn học</h2>
        <button id="addSubjectBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Thêm môn</button>
      </div>
      <div id="subjectList" class="lookup-list"></div>
    </section>

    <section class="card-box lookup-panel">
      <div class="section-heading-split">
        <h2 class="detail-section-title">Khối/Lớp</h2>
        <button id="addGradeBtn" class="btn btn-primary"><i class="fas fa-plus"></i> Thêm khối</button>
      </div>
      <div id="gradeList" class="lookup-list"></div>
    </section>
  </div>
</main>

<div id="lookupModal" class="modal-backdrop hidden">
  <div class="modal-box modal-md">
    <div class="modal-header">
      <h3 id="lookupModalTitle">Cập nhật danh mục</h3>
      <button id="lookupModalCloseBtn" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label id="lookupModalLabel" for="lookupNameInput">Tên</label>
        <input id="lookupNameInput" maxlength="100" placeholder="Nhập tên..." />
      </div>
      <div class="form-actions" style="margin-top:18px">
        <button id="lookupModalCancelBtn" class="btn btn-outline">Hủy</button>
        <button id="lookupModalSaveBtn" class="btn btn-primary">Lưu</button>
      </div>
    </div>
  </div>
</div>

<footer class="site-footer"></footer>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/api-client.js"></script>
<script src="../assets/js/admin-lookups.js?v=20260415-3"></script>
</body>
</html>
