<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Đăng ký lớp của tôi</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .enrollment-filter-card { padding: 18px; margin-bottom: 24px; }
    .enrollment-filter-grid {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: end;
    }
    .enrollment-filter-grid .btn { height: 46px; }
    @media (max-width: 1024px) {
      .enrollment-filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="page-bg">
<header class="site-header">
  <div class="container header-inner">
    <div class="header-left">
      <a href="/index.html" class="logo"><div class="logo-box"><i class="fas fa-graduation-cap"></i></div><span>Gia Sư Việt</span></a>
      <nav class="desktop-nav"><a href="/index.html">Trang chủ</a><a href="/tim-gia-su.html">Tìm gia sư</a><a href="/lop-gia-su.html">Tìm lớp học</a></nav>
    </div>
    <div class="header-right" id="headerRight"></div>
    <button id="mobileMenuButton" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
  </div>
  <div id="mobileMenu" class="mobile-menu hidden"></div>
</header>
<main class="container page-section">
  <div class="heading">
    <h1>Đăng ký lớp của tôi</h1>
    <p>Theo dõi trạng thái các đơn đăng ký vào lớp gia sư mở</p>
  </div>

  <section class="card-box enrollment-filter-card">
    <div class="enrollment-filter-grid">
      <div class="form-group">
        <label for="enrollmentStatusFilterSelect">Trạng thái</label>
        <select id="enrollmentStatusFilterSelect">
          <option value="ALL">Tất cả</option>
          <option value="PENDING">Đang chờ</option>
          <option value="ACCEPTED">Được chấp nhận</option>
          <option value="CANCELLED">Đã hủy</option>
        </select>
      </div>
      <button id="applyEnrollmentFilterButton" class="btn btn-primary"><i class="fas fa-filter"></i> Lọc</button>
    </div>
  </section>

  <div class="toolbar-split">
    <div class="result-text-big" id="enrollmentsCountText">0 đăng ký</div>
  </div>

  <div id="enrollmentsList" class="list-grid"></div>
</main>
<footer class="site-footer"></footer>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/api-client.js"></script>
<script src="../assets/js/learner-enrollments.js"></script>
</body>
</html>
