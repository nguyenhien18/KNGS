<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Tạo bài đăng học viên</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>
  <body class="page-bg">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a href="/index.html" class="logo">
            <div class="logo-box">
              <i class="fas fa-graduation-cap">
              </i>
            </div>
            <span>Gia Sư Việt</span>
          </a>
          <nav class="desktop-nav">
            <a href="/index.html">Trang chủ</a>
            <a href="/tim-gia-su.html">Tìm gia sư</a>
            <a href="/lop-gia-su.html">Tìm lớp học</a>
          </nav>
        </div>
        <div class="header-right" id="headerRight">
        </div>
        <button id="mobileMenuButton" class="mobile-menu-btn">
          <i class="fas fa-bars">
          </i>
        </button>
      </div>
      <div id="mobileMenu" class="mobile-menu hidden">
      </div>
    </header>
    <main class="create-page">
      <div class="container create-wrap">
        <div class="section-heading">
          <h1>Tạo bài đăng tìm gia sư</h1>
          <p>Nhập thông tin nhu cầu học để hệ thống duyệt và kết nối gia sư phù hợp.</p>
        </div>
        <div class="approval-banner pending mb-18">
          <i class="fas fa-hourglass-half">
          </i>
          <div>
            <strong>Quy trình duyệt bài đăng</strong>
            <div class="helper-text">Bài đăng mới sẽ ở trạng thái <strong>Chờ duyệt</strong>. Quản trị viên có thể duyệt hoặc từ chối.</div>
          </div>
        </div>
        <form id="createPostForm">
          <section class="form-section">
            <h2>Thông tin cơ bản</h2>
            <div class="form-group">
              <label>Tiêu đề bài đăng *</label>
              <input id="postTitle" maxlength="120" placeholder="Ví dụ: Tìm gia sư Toán 11 luyện thi học kỳ">
            </div>
            <div class="form-grid two-cols mt-20">
              <div class="form-group">
                <label>Môn học *</label>
                <select id="postSubject">
                </select>
              </div>
              <div class="form-group">
                <label>Khối lớp *</label>
                <select id="postGrade">
                </select>
              </div>
              <div class="form-group">
                <label>Hình thức học *</label>
                <select id="postMode">
                  <option value="ONLINE">ONLINE</option>
                  <option value="OFFLINE">OFFLINE</option>
                  <option value="BOTH">BOTH</option>
                </select>
              </div>
              <div class="form-group">
                <label>Ngân sách / buổi (VND)</label>
                <input id="postBudget" type="number" min="0" placeholder="Ví dụ: 200000">
              </div>
            </div>
            <div class="form-group mt-20">
              <label>Mô tả nhu cầu</label>
              <textarea id="postDescription" rows="5" maxlength="1200" placeholder="Mô tả chi tiết mục tiêu học, mong muốn về gia sư...">
              </textarea>
            </div>
          </section>
          <section class="form-section">
            <h2>Lịch học va địa điểm</h2>
            <div class="form-grid two-cols">
              <div class="form-group">
                <label>Tỉnh / Thành phố</label>
                <select id="postProvince">
                  <option value="">Chọn khu vực</option>
                  <option>Hà Nội</option>
                  <option>TP. Hồ Chí Minh</option>
                  <option>Đà Nẵng</option>
                </select>
              </div>
              <div class="form-group">
                <label>Quận / Huyện</label>
                <input id="postDistrict" placeholder="Ví dụ: Cầu Giấy">
              </div>
            </div>
            <div class="form-group mt-20">
              <label>Địa chỉ cụ thể</label>
              <input id="postAddress" maxlength="255" placeholder="Số nhà, đường... (nếu học offline)">
            </div>
            <div class="form-group mt-20">
              <label>Lịch học mong muốn</label>
              <input id="postStudyTime" maxlength="120" placeholder="Ví dụ: Tối T3, T5, T7 - 19h30 đến 21h">
            </div>
          </section>
          <div class="sticky-submit">
            <a class="btn btn-outline-dark" href="/hoc-vien/learner-posts.html">
              <i class="fas fa-arrow-left">
              </i> Quay lai</a>
            <button type="submit" class="btn btn-primary btn-lg">
              <i class="fas fa-paper-plane">
              </i> Tạo bài đăng</button>
          </div>
        </form>
      </div>
    </main>
    <footer class="site-footer">
    </footer>
    <script src="../assets/js/core/format-utils.js">
    </script>
    <script src="../assets/js/core/dom-utils.js">
    </script>
    <script src="../assets/js/core/ui-utils.js">
    </script>
    <script src="../assets/js/core/app.js">
    </script>
    <script src="../assets/js/core/api-client.js">
    </script>
    <script src="../assets/js/core/auth-guard.js">
    </script>
    <script src="../assets/js/learner/create-post.js">
    </script>
  </body>
</html>
