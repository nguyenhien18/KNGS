<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Bài đăng của tôi</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    .post-filter-card { padding: 18px; margin-bottom: 24px; }
    .post-filter-grid {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 16px;
      align-items: end;
    }
    .post-filter-grid .btn { height: 46px; }
    @media (max-width: 1024px) {
      .post-filter-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="page-bg">
<header class="site-header">
  <div class="container header-inner">
    <div class="header-left">
      <a href="/index.html" class="logo"><div class="logo-box"><i class="fas fa-graduation-cap"></i></div><span>Gia Sư Việt</span></a>
      <nav class="desktop-nav"><a href="/index.html">Trang chủ</a><a href="/tim-gia-su.html">Tìm gia sư</a><a href="/lop-gia-su.html">Tìm lớp học</a></nav>
    </div>
    <div class="header-right" id="headerRight"></div>
    <button id="mobileMenuButton" class="mobile-menu-btn"><i class="fas fa-bars"></i></button>
  </div>
  <div id="mobileMenu" class="mobile-menu hidden"></div>
</header>
<main class="container page-section">
  <div class="manage-header">
    <div><h1>Bài đăng của tôi</h1><p>Theo dõi tình trạng duyệt và cập nhật bài đăng</p></div>
    <a class="btn btn-primary btn-lg" href="/hoc-vien/tao-bai-dang.html"><i class="fas fa-plus"></i> Tạo bài đăng</a>
  </div>

  <section class="card-box post-filter-card">
    <div class="post-filter-grid">
      <div class="form-group">
        <label for="postStatusFilterSelect">Trạng thái</label>
        <select id="postStatusFilterSelect">
          <option value="ALL">Tất cả</option>
          <option value="PENDING">Chờ duyệt</option>
          <option value="APPROVED">Đã duyệt</option>
          <option value="REJECTED">Bị từ chối</option>
          <option value="CANCELLED">Đã hủy</option>
        </select>
      </div>
      <button id="applyPostFilterButton" class="btn btn-primary"><i class="fas fa-filter"></i> Lọc</button>
    </div>
  </section>

  <div class="toolbar-split">
    <div class="result-text-big" id="postsCountText">0 bài đăng</div>
  </div>

  <div id="postsList" class="list-grid"></div>
</main>

<div id="applicationsModal" class="modal-backdrop hidden">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <h3>Danh sách gia sư ứng tuyển</h3>
      <button id="closeApplicationsModalButton" class="modal-close"><i class="fas fa-times"></i></button>
    </div>
    <div id="applicationsModalContent" class="modal-body"></div>
  </div>
</div>

<footer class="site-footer"></footer>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/api-client.js"></script>
<script src="../assets/js/learner-posts.js"></script>
</body>
</html>
