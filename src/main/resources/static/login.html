<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập / Đăng ký - Gia Sư Việt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/auth.css?v=20260606-footer-1" />
  </head>
  <body class="auth-page">
    <nav class="auth-navbar">
      <a href="index.html" class="nav-logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
          </svg>
        </div>
        Gia Sư Việt
      </a>
    </nav>
    <main class="auth-main">
      <div class="auth-tab-wrap">
        <div class="auth-tab active" id="tabLogin" data-auth-tab="login" role="button" tabindex="0">Đăng nhập</div>
        <div class="auth-tab" id="tabRegister" data-auth-tab="register" role="button" tabindex="0">Đăng ký</div>
      </div>
      <div class="auth-card" id="loginCard">
        <h2>Đăng nhập</h2>
        <p class="auth-desc">Nhập thông tin để đăng nhập vào tài khoản của bạn</p>
        <div class="auth-alert error" id="loginAlert">
          <span id="loginAlertMsg">
          </span>
        </div>
        <form id="loginForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="loginEmail">Email</label>
            <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="loginPassword">Mật khẩu</label>
            <div class="input-wrap">
              <input type="password" id="loginPassword" class="form-input" placeholder="Nhập mật khẩu" autocomplete="current-password" />
              <span class="input-icon" data-toggle-password="loginPassword">👁</span>
            </div>
          </div>
          <button type="submit" class="btn-submit" id="loginBtn">Đăng nhập</button>
        </form>
      </div>
      <div class="auth-card auth-register-card hidden" id="registerCard">
        <h2>Đăng ký tài khoản</h2>
        <p class="auth-desc">Tạo tài khoản mới để bắt đầu sử dụng dịch vụ</p>
        <div class="auth-alert error" id="registerAlert">
          <span id="registerAlertMsg">
          </span>
        </div>
        <div class="auth-alert success" id="registerSuccess">
          <span>Đăng ký thành công! Đang chuyển hướng...</span>
        </div>
        <div class="role-toggle-wrap">
          <label class="form-label">Bạn là:</label>
          <div class="role-toggle">
            <div class="role-btn active" id="roleLearner" data-auth-role="learner" role="button" tabindex="0">Học viên</div>
            <div class="role-btn" id="roleTutor" data-auth-role="tutor" role="button" tabindex="0">Gia sư</div>
          </div>
        </div>
        <form id="registerForm" novalidate>
          <div class="form-group">
            <label class="form-label" for="regName">Họ và tên</label>
            <input type="text" id="regName" class="form-input" placeholder="Nguyễn Văn A" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="regEmail">Email</label>
              <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" />
            </div>
            <div class="form-group">
              <label class="form-label" for="regPhone">Số điện thoại</label>
              <input type="tel" id="regPhone" class="form-input" placeholder="0123456789" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="regBirth">Ngày sinh</label>
              <input type="date" id="regBirth" class="form-input" />
            </div>
            <div class="form-group">
              <label class="form-label" for="regGender">Giới tính</label>
              <select id="regGender" class="form-select">
                <option value="OTHER">Khác</option>
                <option value="MALE">Nam</option>
                <option value="FEMALE">Nữ</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="regPassword">Mật khẩu</label>
            <div class="input-wrap">
              <input type="password" id="regPassword" class="form-input" placeholder="Tối thiểu 8 ký tự" />
              <span class="input-icon" data-toggle-password="regPassword">👁</span>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="regPasswordConfirm">Xác nhận mật khẩu</label>
            <div class="input-wrap">
              <input type="password" id="regPasswordConfirm" class="form-input" placeholder="Nhập lại mật khẩu" />
              <span class="input-icon" data-toggle-password="regPasswordConfirm">👁</span>
            </div>
          </div>
          <div class="form-check">
            <input type="checkbox" id="regAgree" />
            <label for="regAgree">Tôi đồng ý với điều khoản sử dụng và chính sách bảo mật.</label>
          </div>
          <button type="submit" class="btn-submit" id="registerBtn">Đăng ký</button>
        </form>
      </div>
    </main>
    <footer class="auth-footer">
      <div class="auth-footer-inner">
        <span class="auth-footer-brand">Gia Sư Việt</span>
        <nav class="auth-footer-nav" aria-label="Liên kết chân trang">
          <a href="/index.html">Trang chủ</a>
          <a href="/tim-gia-su.html">Tìm gia sư</a>
          <a href="/lop-gia-su.html">Lớp gia sư mở</a>
          <a href="/bai-dang-phu-huynh.html">Lớp học viên đăng</a>
        </nav>
      </div>
    </footer>
    <script src="assets/js/auth.js">
    </script>
  </body>
</html>
