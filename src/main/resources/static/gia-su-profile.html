  </head>
  <body class="page-bg">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a href="index.html" class="logo">
            <div class="logo-box">
              <i class="fas fa-graduation-cap"></i>
            </div>
            <span>Cổng Gia Sư</span>
          </a>
          <nav class="desktop-nav">
            <a href="index.html">Trang chủ</a>
            <a href="tim-gia-su.html">Tìm gia sư</a>
            <a href="tim-lop.html">Tìm lớp học</a>
          </nav>
        </div>
        <div class="header-right" id="headerRight"></div>
        <button id="mobileMenuButton" class="mobile-menu-btn">
          <i class="fas fa-bars"></i>
        </button>
      </div>
      <div id="mobileMenu" class="mobile-menu hidden">
        <a href="index.html">Trang chủ</a>
        <a href="tim-gia-su.html">Tìm gia sư</a>
        <a href="tim-lop.html">Tìm lớp học</a>
      </div>
    </header>

    <main class="tutor-public-page">
      <div class="container">
        <div class="tutor-public-back">
          <a href="javascript:history.back()">
            <i class="fas fa-arrow-left"></i> Quay lại
          </a>
        </div>

        <div class="tutor-public-layout">
          <section class="tutor-public-main">
            <div id="profileHeader" class="card-box"></div>

            <div class="card-box">
              <h2 class="detail-section-title">Giới thiệu</h2>
              <div id="tutorIntro" class="detail-text-block"></div>
            </div>

            <div id="achievementsSection" class="card-box hidden">
              <h2 class="detail-section-title">Thành tích nổi bật</h2>
              <div class="achievement-simple-slider">
                <button id="prevAchievement" class="slider-nav-btn">
                  <i class="fas fa-chevron-left"></i>
                </button>
                <div class="achievement-track-wrap">
                  <div id="achievementsContainer" class="achievement-track"></div>
                </div>
                <button id="nextAchievement" class="slider-nav-btn">
                  <i class="fas fa-chevron-right"></i>
                </button>
              </div>
            </div>

            <div class="card-box">
              <div class="section-heading-split">
                <h2 class="detail-section-title no-mb">Lớp học mới nhất</h2>
                <a href="tim-lop.html" class="text-link">
                  Xem tất cả <i class="fas fa-arrow-right"></i>
                </a>
              </div>
              <div id="classOfTutor" class="public-class-grid mt-20"></div>
            </div>

            <div class="card-box">
              <h2 class="detail-section-title">Đánh giá từ học viên</h2>
              <div id="ratingOverview" class="rating-overview-grid"></div>
              <div id="reviewList" class="review-list mt-20"></div>
            </div>
          </section>

          <aside class="tutor-public-sidebar">
            <div class="detail-sticky">
              <div id="ownerStatusCard" class="card-box hidden"></div>
              <div class="card-box">
                <h3 class="detail-sidebar-title">Thông tin chi tiết</h3>
                <div id="detailInfo"></div>
              </div>
            </div>
          </aside>
        </div>
      </div>
    </main>

    <footer class="site-footer">
  <div class="container footer-inner">
    <span>Gia Sư Việt</span>
    <nav>
      <a href="/index.html">Trang chủ</a>
      <a href="/tim-gia-su.html">Tìm gia sư</a>
      <a href="/lop-gia-su.html">Lớp gia sư mở</a>
      <a href="/bai-dang-phu-huynh.html">Lớp học viên đăng</a>
    </nav>
  </div>
</footer>

    <div id="imageLightbox" class="lightbox hidden">
      <span id="closeLightbox" class="lightbox-close">×</span>

    <script src="assets/js/core/format-utils.js"></script>
