    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  </head>
  <body class="page-bg">
    <header class="site-header">
      <div class="container header-inner">
        <div class="header-left">
          <a href="index.html" class="logo">
            <div class="logo-box">
              <i class="fas fa-graduation-cap">
              </i>
            </div>
            <span>Cổng Gia Sư</span>
          </a>
          <nav class="desktop-nav">
            <a href="index.html">Trang chủ</a>
            <a href="tim-gia-su.html">Tìm gia sư</a>
            <a href="tim-lop.html" class="active">Tìm lớp học</a>
          </nav>
        </div>
        <div class="header-right" id="headerRight">
        </div>
        <button id="mobileMenuButton" class="mobile-menu-btn">
          <i class="fas fa-bars">
          </i>
        </button>
      </div>
      <div id="mobileMenu" class="mobile-menu hidden">
        <a href="index.html">Trang chủ</a>
        <a href="tim-gia-su.html">Tìm gia sư</a>
        <a href="tim-lop.html" class="active">Tìm lớp học</a>
      </div>
    </header>
    <main class="list-shell">
      <div class="container">
        <div class="hero-mini">
          <h1>Lớp do gia sư đăng</h1>
          <p>Khám phá các lớp và khóa học do gia sư chủ động mở. Học viên có thể xem chi tiết và đăng ký tham gia.</p>
        </div>
        <section class="search-panel card-box list-filter-panel">
          <div class="search-grid">
            <div class="search-field">
              <label for="courseSubjectFilter">Môn học</label>
              <select id="courseSubjectFilter">
                <option value="">Tất cả môn học</option>
              </select>
            </div>
            <div class="search-field">
              <label for="courseGradeFilter">Khối lớp</label>
              <select id="courseGradeFilter">
                <option value="">Tất cả khối lớp</option>
              </select>
            </div>
            <div class="search-field">
              <label for="courseModeFilter">Hình thức học</label>
              <select id="courseModeFilter">
                <option value="">Tất cả hình thức</option>
                <option value="ONLINE">Online</option>
                <option value="OFFLINE">Offline</option>
                <option value="BOTH">Online và Offline</option>
              </select>
            </div>
            <div class="search-field">
              <label for="courseProvinceFilter">Tỉnh/thành</label>
              <input id="courseProvinceFilter" placeholder="Ví dụ: Hà Nội">
            </div>
            <div class="search-field">
              <label for="courseDistrictFilter">Quận/huyện</label>
              <input id="courseDistrictFilter" placeholder="Ví dụ: Cầu Giấy">
            </div>
            <button id="courseSearchButton" class="btn btn-primary full-btn">
              <i class="fas fa-search"></i> Lọc lớp
            </button>
          </div>
        </section>
        <div class="toolbar-split">
          <p class="result-text-big">Tìm thấy <strong id="resultCount">0</strong> lớp do gia sư đăng</p>
        </div>
        <div id="courseList" class="manage-list">
        </div>
      </div>
    </main>
    <footer class="site-footer">
  <div class="container footer-inner">
    <span>Gia Sư Việt</span>
    <nav>
      <a href="/index.html">Trang chủ</a>

      <a href="/bai-dang-phu-huynh.html">Lớp học viên đăng</a>
    </nav>
  </div>
</footer>

  </body>
</html>
