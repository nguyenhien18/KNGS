spring.application.name=KET_NOI_GIA_SU
spring.config.import=optional:file:./secrets-local.properties

server.port=${SERVER_PORT:8088}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/kngs2?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN

spring.jackson.time-zone=Asia/Bangkok
spring.jpa.open-in-view=false

# Local dev fallback to avoid startup failure when env var is missing.
# In production, always provide JWT_SECRET from environment/secret manager.
jwt.secret=${JWT_SECRET:DEV_ONLY_CHANGE_ME_0123456789ABCDEF0123456789ABCDEF0123456789AB}
jwt.expiration=86400000
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:8087,http://127.0.0.1:8087,http://localhost:5500,http://127.0.0.1:5500}

app.seed.default-admin.enabled=${APP_SEED_DEFAULT_ADMIN_ENABLED:false}
app.seed.default-admin.email=${APP_SEED_DEFAULT_ADMIN_EMAIL:admin1@gmail.com}
app.seed.default-admin.password=${APP_SEED_DEFAULT_ADMIN_PASSWORD:}
app.seed.default-admin.phone=${APP_SEED_DEFAULT_ADMIN_PHONE:0900000000}

app.limits.learner-posts-per-day=${APP_LIMITS_LEARNER_POSTS_PER_DAY:4}
app.limits.tutor-courses-per-day=${APP_LIMITS_TUTOR_COURSES_PER_DAY:4}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

